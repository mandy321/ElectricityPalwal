name: Monthly Outage Report Generator

on:
  schedule:
    # Run on the 1st of every month at 00:05 UTC
    - cron: '5 0 1 * *'
  workflow_dispatch: # allows manual trigger

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Monthly Report
        run: node scripts/generate_monthly_report.js

      - name: Commit Report and Manifest updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          # check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: auto-generate monthly outage health report"
            git push
          fi
